<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View on Orlay</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Basic styling for a clean UI */
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f4f7f6; margin: 0; }
        .container { text-align: center; background: white; padding: 40px 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 90%; max-width: 350px; display: none; }
        .loader { display: flex; flex-direction: column; align-items: center; }
        .spinner { width: 40px; height: 40px; border: 4px solid #e0e0e0; border-top: 4px solid #ff4757; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .btn { display: block; padding: 15px; margin: 10px 0; border-radius: 10px; text-decoration: none; color: white; background: #000; font-weight: bold; }
    </style>
</head>
<body>

    <div id="loader" class="loader">
        <div class="spinner"></div>
        <h2>Opening Orlay...</h2>
    </div>

    <div id="fallback-ui" class="container">
        <h2>Get Orlay App</h2>
        <p>App not found. Please download it below:</p>
        <a href="https://play.google.com/store/apps/details?id=com.orlay" class="btn">Get it on Google Play</a>
        <a href="https://apps.apple.com/in/app/orlay-food-delivery-at-dinein/id6445892949" class="btn">Download on App Store</a>
    </div>

    <script>
        // Extract outlet ID from the URL query parameter (e.g., ?id=123)
        const urlParams = new URLSearchParams(window.location.search);
        const outletId = urlParams.get('id');

        // Construct the deep link for the app
        const appSchemeUrl = outletId ? `orlay://outlet/details/${outletId}` : `orlay://home`;

        window.onload = function() {
            // Attempt to open the app immediately
            window.location.href = appSchemeUrl;

            // If app does not open within 2 seconds, show download buttons
            setTimeout(function() {
                document.getElementById('loader').style.display = 'none';
                document.getElementById('fallback-ui').style.display = 'block';
            }, 2000);
        };
    </script>
</body>
</html>
